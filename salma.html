<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salma1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f3fb;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e0dff5;
      border-radius: 16px;
      padding: 3rem 4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(127,119,221,0.08);
    }

    .accent-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #AFA9EC, #5DCAA5);
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #EEEDFE;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 24px;
      font-weight: 500;
      color: #3C3489;
      border: 1px solid #CECBF6;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }

    .name {
      font-size: 42px;
      font-weight: 500;
      color: #3C3489;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
      transition: color 0.3s;
    }

    .tagline {
      font-size: 14px;
      color: #888;
      margin-bottom: 2rem;
    }

    .dots {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 2px solid transparent;
    }

    .dot:hover {
      transform: scale(1.3);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.1);
    }

    .btn {
      background: transparent;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover { background: #f5f5f5; }
    .btn:active { transform: scale(0.98); }

    .msg {
      margin-top: 1.25rem;
      font-size: 14px;
      color: #666;
      min-height: 22px;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="accent-bar"></div>
    <div class="avatar" id="avatar">S</div>
    <div class="name" id="name">Salma</div>
    <p class="tagline">Choose a color theme</p>

    <div class="dots">
      <div class="dot" style="background:#7F77DD;" onclick="setColor('#EEEDFE','#3C3489','#CECBF6')"></div>
      <div class="dot" style="background:#1D9E75;" onclick="setColor('#E1F5EE','#085041','#9FE1CB')"></div>
      <div class="dot" style="background:#D4537E;" onclick="setColor('#FBEAF0','#72243E','#F4C0D1')"></div>
      <div class="dot" style="background:#378ADD;" onclick="setColor('#E6F1FB','#0C447C','#B5D4F4')"></div>
      <div class="dot" style="background:#D85A30;" onclick="setColor('#FAECE7','#712B13','#F5C4B3')"></div>
    </div>

    <button class="btn" onclick="wave()">Say hello 👋</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const greetings = [
      "Hello, Salma! 🌸",
      "Welcome, Salma! ✨",
      "Hey there, Salma! 🎉",
      "Hi Salma, lovely to meet you! 💫",
      "Salma — what a beautiful name! 🌟"
    ];
    let gi = 0;

    function wave() {
      const msg = document.getElementById('msg');
      msg.style.opacity = 0;
      setTimeout(() => {
        msg.textContent = greetings[gi % greetings.length];
        gi++;
        msg.style.opacity = 1;
      }, 150);
    }

    function setColor(bg, text, border) {
      const av = document.getElementById('avatar');
      av.style.background = bg;
      av.style.color = text;
      av.style.borderColor = border;
      document.getElementById('name').style.color = text;
    }
  </script>

</body>
</html>
